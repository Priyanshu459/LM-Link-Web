<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient: deep purple to violet -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2d1060"/>
    </linearGradient>

    <!-- Main purple gradient for LM letters -->
    <linearGradient id="lmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a0ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Link arc gradient: cyan-to-purple glow -->
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#47bfff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#47bfff"/>
    </linearGradient>

    <!-- Glow filter for the link arc -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Inner glow on background -->
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#863bff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a0a2e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Inner glow overlay -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#innerGlow)"/>

  <!-- Subtle border glow -->
  <rect width="62" height="62" x="1" y="1" rx="13" ry="13"
        fill="none" stroke="#863bff" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- "L" letter - bold, clean -->
  <text x="7" y="43"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="28"
        fill="url(#lmGrad)"
        letter-spacing="-1">L</text>

  <!-- "M" letter - bold, clean -->
  <text x="24" y="43"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="28"
        fill="url(#lmGrad)"
        letter-spacing="-1">M</text>

  <!-- Link chain icon underneath - two interlocking ovals -->
  <!-- Left oval of chain -->
  <rect x="8" y="47" width="18" height="9" rx="4.5" ry="4.5"
        fill="none" stroke="url(#linkGrad)" stroke-width="2.2"
        filter="url(#glow)"/>

  <!-- Right oval of chain -->
  <rect x="22" y="47" width="18" height="9" rx="4.5" ry="4.5"
        fill="none" stroke="url(#linkGrad)" stroke-width="2.2"
        filter="url(#glow)"/>

  <!-- Connecting overlap fill (makes them look linked) -->
  <rect x="26" y="48.5" width="8" height="6" rx="0"
        fill="#1e0d45"/>

  <!-- Top connection sparkle dots -->
  <circle cx="53" cy="11" r="2" fill="#47bfff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="58" cy="18" r="1.2" fill="#863bff" opacity="0.8"/>
  <circle cx="50" cy="19" r="1" fill="#d4a0ff" opacity="0.6"/>
</svg>